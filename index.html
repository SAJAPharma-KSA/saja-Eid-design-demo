<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مولد بطاقات العيد - الإصدار المصحح</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@900&display=swap" rel="stylesheet">
<style>
  body { background: #0d1f2d; color: white; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; max-width: 500px; width: 100%; text-align: center; border: 1px solid #c3a377; }
  canvas { width: 100%; height: auto; border-radius: 10px; margin: 20px 0; background: #000; }
  .inputs { display: flex; gap: 10px; margin-bottom: 15px; }
  input { width: 50%; padding: 12px; border-radius: 8px; border: 1px solid #c3a377; background: #1a3a4a; color: white; text-align: center; font-family: 'Tajawal', sans-serif; font-weight: 900; }
  .btn { background: #c3a377; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: 900; cursor: pointer; font-size: 1.1rem; font-family: 'Tajawal', sans-serif; }
</style>
</head>
<body>

<div class="container">
  <div class="inputs">
    <input type="text" id="nameAr" placeholder="الاسم بالعربي" oninput="draw()">
    <input type="text" id="nameEn" placeholder="English Name" oninput="draw()" dir="ltr">
  </div>
  <canvas id="eidCanvas" width="1000" height="1200"></canvas>
  <button class="btn" onclick="download()">تحميل البطاقة بجودة عالية</button>
</div>

<script>
const canvas = document.getElementById('eidCanvas');
const ctx = canvas.getContext('2d');
const bgImg = new Image();

// التأكد من تحميل الصورة بشكل آمن
bgImg.crossOrigin = "anonymous";
bgImg.src = 'https://i.imgur.com/X21ZiCd.png'; 

// لا يبدأ الرسم إلا بعد التأكد من أن الصورة والخطوط جاهزة
bgImg.onload = () => {
    document.fonts.ready.then(() => {
        draw();
    });
};

function draw() {
    // 1. رسم الخلفية أولاً
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    
    const nameAr = document.getElementById('nameAr').value;
    const nameEn = document.getElementById('nameEn').value;

    if(nameAr || nameEn) {
        // 2. إعدادات الاسم العربي (نفس الخط والوزن الأصلي)
        ctx.fillStyle = "#c3a377"; 
        ctx.font = "900 48px 'Tajawal', sans-serif"; 
        ctx.textAlign = "center";
        // الموقع 1080 ليكون أسفل كلمة Eid Mubarak
        ctx.fillText(nameAr, canvas.width / 2, 1080); 

        // 3. إعدادات الاسم الإنجليزي (نفس الخط والوزن الأصلي)
        ctx.fillStyle = "#ffffff"; 
        ctx.font = "900 35px 'Tajawal', sans-serif"; 
        ctx.fillText(nameEn, canvas.width / 2, 1140); 
    }
}

function download() {
    const link = document.createElement('a');
    link.download = 'Eid_Greeting_2026.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
}
</script>

</body>
</html>
